spring:
    application:
        name: email-reader
    profiles:
      active: "dev"

email:
  account:
    # Bind credentials from environment variables — never hardcode secrets
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}

    # Switch provider here: GMAIL or OUTLOOK (values from EmailProvider enum)
    provider: ${EMAIL_PROVIDER:GMAIL}

    # How often to poll for new emails (milliseconds). Default: 60 seconds
    polling-interval-ms: ${EMAIL_POLLING_INTERVAL_MS:60000}
